version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: appdb
      DB_SSL: "false"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: [localhost](http://localhost:8080)
    ports:
      - "3000:8080"
    depends_on:
      - backend
