name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      REPOSITORY: app-images
      BACKEND_SERVICE: backend-service
      FRONTEND_SERVICE: frontend-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest ./backend

      - name: Push backend image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated

      - name: Get backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $REGION --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build frontend image
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ steps.backend_url.outputs.url }} \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated
